name: Build emby SRS

on:
  push:
    paths:
      - "rule/surge/emby.list"
      - "convert.py"
      - ".github/workflows/build.yml"
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Convert Surge rules to sing-box JSON
        run: python convert.py

      - name: Install sing-box
        run: |
          curl -fsSL https://sing-box.app/get.sh -o get.sh
          sudo bash get.sh

      - name: Compile emby SRS
        run: sing-box rule-set compile rule/emby.json --output rule/emby.srs

      - name: Commit generated SRS
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add rule/emby.srs
          git diff --cached --quiet || git commit -m "Build emby.srs"
          git push
