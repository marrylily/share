name: Build emby SRS

on:
  push:
    paths:
      - "rule/surge/emby.list"
      - "convert.py"
      - ".github/workflows/build.yml"
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Convert Surge rules to sing-box JSON
        run: python convert.py

      - name: Install sing-box
        run: |
          curl -fsSL -o sing-box.tar.gz https://github.com/SagerNet/sing-box/releases/download/v1.13.13/sing-box-1.13.13-linux-amd64.tar.gz
          tar -xzf sing-box.tar.gz
          sudo install -m 0755 ./sing-box-1.13.13-linux-amd64/sing-box /usr/local/bin/sing-box

      - name: Compile emby SRS
        run: |
          mkdir -p rule/Cash/Egern
          rm -f rule/emby.srs
          sing-box rule-set compile rule/emby.json --output rule/Cash/Egern/emby.srs
          test -s rule/Cash/Egern/emby.srs

      - name: Commit generated SRS
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A rule
          git diff --cached --quiet || git commit -m "Build emby.srs"
          git push origin HEAD:${{ github.ref_name }}
